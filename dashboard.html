<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAISON Residence - สวัสดิการแรกเข้า TQM — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kodchasan:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #EDE7DA;
  --bg-alt:      #F5F1E8;
  --surface:     #FFFDF8;
  --surface-soft:#FBF8F1;
  --ink:         #23201B;
  --ink-soft:    #4A453C;
  --muted:       #857D6E;
  --muted-2:     #9A9182;
  --line-color:  #E7DFCE;
  --line-2:      #E2DAC9;
  --pine:        #1E3A34;
  --pine-deep:   #16302A;
  --brass:       #A8834F;
  --brass-soft:  #C9A876;
  --brass-bg:    #F2EAD9;
}

html, body {
  min-height: 100%;
  font-family: 'Kodchasan', sans-serif;
  background: var(--bg);
  color: var(--ink);
}

/* ── TOP BAR ── */
.topbar {
  position: sticky; top: 0; z-index: 200;
  background: var(--pine);
  display: flex; align-items: center;
  padding: 0 28px;
  height: 60px;
}

.topbar-logo {
  display: flex; align-items: center; gap: 10px;
  text-decoration: none;
  flex-shrink: 0;
}
.logo-mark {
  width: 34px; height: 34px;
  border-radius: 50%;
  border: 1.5px solid rgba(201,168,118,.5);
  display: flex; align-items: center; justify-content: center;
  background: rgba(169,131,79,.1);
}
.logo-mark span { font-size: 16px; font-weight: 700; color: var(--brass-soft); }
.logo-text {
  font-size: 12px; font-weight: 600;
  letter-spacing: .22em;
  color: rgba(255,255,255,.85);
  text-transform: uppercase;
}

/* ── Desktop nav (centered) ── */
.topbar-nav {
  position: absolute;
  left: 50%; transform: translateX(-50%);
  display: flex; align-items: center; gap: 4px;
}
.nav-link {
  padding: 6px 16px;
  border-radius: 7px;
  font-size: 13px; font-weight: 500;
  color: rgba(255,255,255,.65);
  text-decoration: none;
  transition: background .15s, color .15s;
}
.nav-link:hover  { background: rgba(255,255,255,.08); color: #fff; }
.nav-link.active { background: rgba(255,255,255,.12); color: #fff; }

/* ── User (right) ── */
.topbar-right {
  margin-left: auto;
  display: flex; align-items: center; gap: 8px;
  position: relative;
}
/* ── USER DROPDOWN ── */
.user-dropdown { position: absolute; top: calc(100% + 6px); right: 0; background: #fff; border: 1px solid #E7DFCE; border-radius: 12px; min-width: 160px; box-shadow: 0 8px 24px rgba(0,0,0,.14); overflow: hidden; display: none; z-index: 500; }
.user-dropdown.open { display: block; }
.user-dd-item { display: block; width: 100%; padding: 11px 16px; font-size: 13px; font-weight: 600; color: #23201B; text-decoration: none; background: none; border: none; cursor: pointer; text-align: left; font-family: 'Kodchasan', sans-serif; transition: background .15s; white-space: nowrap; }
.user-dd-item:hover { background: #F5F1E8; }
.user-dd-logout { color: #C84040; border-top: 1px solid #E7DFCE; }
.topbar-user {
  display: flex; align-items: center; gap: 10px;
  text-decoration: none;
  padding: 6px 10px;
  border-radius: 9px;
  transition: background .15s;
}
.topbar-user:hover { background: rgba(255,255,255,.08); }
.topbar-user-info { text-align: right; }
.topbar-user-name {
  display: block; font-size: 13px; font-weight: 600;
  color: #fff; line-height: 1.2;
}
.topbar-user-dept {
  display: block; font-size: 11px; color: rgba(255,255,255,.5);
}
.avatar {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--brass);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700; color: #fff;
  flex-shrink: 0; overflow: hidden;
}
.avatar img { width: 100%; height: 100%; object-fit: cover; }

/* ── Notification Bell ── */
.notif-btn {
  position: relative; background: none; border: none; cursor: pointer;
  width: 38px; height: 38px; display: flex; align-items: center; justify-content: center;
  border-radius: 9px; transition: background .15s; flex-shrink: 0;
}
.notif-btn:hover { background: rgba(255,255,255,.08); }
.notif-btn svg { width: 20px; height: 20px; stroke: rgba(255,255,255,.75); fill: none; stroke-linecap: round; stroke-linejoin: round; }
.notif-badge {
  position: absolute; top: 4px; right: 4px;
  background: #E05454; color: #fff; font-size: 9px; font-weight: 700;
  min-width: 16px; height: 16px; border-radius: 8px; padding: 0 4px;
  align-items: center; justify-content: center; display: none;
}
.notif-panel {
  position: absolute; top: calc(100% + 10px); right: 0;
  width: 320px; max-height: 380px;
  background: #fff; border: 1px solid #E7DFCE; border-radius: 14px;
  box-shadow: 0 12px 32px rgba(0,0,0,.16);
  display: none; flex-direction: column; z-index: 600; overflow: hidden;
}
.notif-panel.open { display: flex; }
.notif-panel-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px 10px; border-bottom: 1px solid #F0EBE0; flex-shrink: 0;
}
.notif-panel-head span { font-size: 13px; font-weight: 700; color: #23201B; }
.notif-mark-all {
  background: none; border: none; cursor: pointer;
  font-size: 11px; color: #A8834F; font-weight: 600;
  font-family: 'Kodchasan', sans-serif; padding: 0;
}
.notif-list { overflow-y: auto; flex: 1; }
.notif-empty { padding: 28px 16px; text-align: center; font-size: 12px; color: #857D6E; }
.notif-item {
  display: flex; gap: 10px; padding: 11px 14px;
  border-bottom: 1px solid #F5F1E8; cursor: pointer;
  transition: background .12s; align-items: flex-start;
}
.notif-item:hover { background: #FDFAF4; }
.notif-item.unread { background: #FBF8F1; }
.notif-item.unread:hover { background: #F5F0E6; }
.notif-dot { width: 7px; height: 7px; border-radius: 50%; background: #E05454; flex-shrink: 0; margin-top: 5px; }
.notif-dot.read { background: transparent; }
.notif-content { flex: 1; min-width: 0; }
.notif-msg { font-size: 12px; font-weight: 600; color: #23201B; line-height: 1.4; word-break: break-word; }
.notif-time { font-size: 10px; color: #857D6E; margin-top: 2px; }

/* ── Mobile burger button ── */
.burger-btn {
  display: none;
  position: relative; z-index: 1000;
  background: none; border: 0; cursor: pointer;
  padding: 10px 0 10px 10px;
  flex-direction: column; align-items: center;
  margin-left: auto;
}
.burger-line {
  position: relative;
  display: block;
  width: 26px; height: 3px;
  background: rgba(255,255,255,.85);
  transform: skew(5deg);
  transition: all .275s;
  border-radius: 2px;
}
.burger-line::before,
.burger-line::after {
  content: ''; display: block;
  height: 100%; background: rgba(255,255,255,.85);
  transition: all .275s; border-radius: 2px;
}
.burger-line::after  { transform: translateY(-10px) translateX(-2px) skew(-20deg); }
.burger-line::before { transform: translateY(-13px) skew(-10deg); }

.burger-btn.is-open .burger-line { transform: skew(5deg) translateY(-7px) rotate(-45deg); }
.burger-btn.is-open .burger-line::before { transform: translateY(0px) skew(-10deg) rotate(75deg); }
.burger-btn.is-open .burger-line::after  { transform: translateY(-10px) translateX(8px) skew(-20deg); opacity: 0; }
.burger-label {
  display: block; font-size: 9px; letter-spacing: .08em;
  text-transform: uppercase; font-weight: 600;
  color: rgba(255,255,255,.6); margin-top: 5px;
  font-family: 'Kodchasan', sans-serif;
}

/* ── Mobile nav overlay (CodePen by Geoffrey Crofte, adapted) ── */
.mobile-nav {
  position: fixed;
  top: 0; right: 0; left: 0; bottom: 0;
  background: var(--pine-deep);
  opacity: 0; z-index: 150;
  visibility: hidden;
  transition: all .375s;
  display: flex; align-items: center; justify-content: center;
}
.mobile-nav.is-open {
  opacity: 1; z-index: 150; visibility: visible;
}
/* brass band sweep */
.mobile-nav::before {
  content: '';
  position: absolute;
  top: 0; bottom: 0; left: 0; right: -15px;
  background: var(--pine);
  transform-origin: 0 0;
  transform: skew(-14deg) translateX(-120%);
  transition: all .275s .1s;
}
.mobile-nav.is-open::before {
  transform: skew(-14deg) translateX(0);
}
.mobile-nav-inner {
  position: relative; z-index: 1;
  display: inline-flex; flex-direction: column;
  align-items: flex-end;
  transform: translateX(-10%) skew(-16deg);
}
.mobile-nav-inner li {
  display: block; margin: .4rem 0;
  text-align: right;
  list-style: none; padding: 0;
  transform: skew(16deg);
}
.mobile-nav-inner a {
  display: block; padding: 14px 4px;
  color: rgba(255,255,255,.85);
  font-size: 1.6em; font-weight: 700;
  text-decoration: none;
  font-family: 'Kodchasan', sans-serif;
  opacity: 0; transform: translateY(-10px);
  transition: color .2s;
}
.mobile-nav-inner a:hover { color: var(--brass-soft); }
.mobile-nav.is-open a { opacity: 1; transform: translateY(0); }
.mobile-nav-inner li:nth-child(1) a { transition: opacity 275ms 175ms, transform 275ms 175ms, color .2s; }
.mobile-nav-inner li:nth-child(2) a { transition: opacity 275ms 225ms, transform 275ms 225ms, color .2s; }
.mobile-nav-inner li:nth-child(3) a { transition: opacity 275ms 275ms, transform 275ms 275ms, color .2s; }
.mobile-nav-inner li:nth-child(4) a { transition: opacity 275ms 325ms, transform 275ms 325ms, color .2s; }
/* active indicator */
.mobile-nav-inner a.active {
  color: var(--brass-soft);
}
.mobile-nav-inner a.active::after {
  content: ' ·'; color: var(--brass);
}

/* ── PAGE ── */
.page {
  max-width: 1080px;
  margin: 0 auto;
  padding: 40px 34px 80px;
}

/* ── PAGE HEADER ── */
.page-header {
  display: flex; align-items: flex-end;
  justify-content: space-between;
  margin-bottom: 28px;
  gap: 16px;
}
.page-eyebrow {
  font-size: 11px; font-weight: 600;
  letter-spacing: .28em;
  text-transform: uppercase;
  color: var(--brass);
  margin-bottom: 6px;
}
.page-title {
  font-size: 28px; font-weight: 700;
  color: var(--ink); line-height: 1.15;
}

.btn-new {
  display: flex; align-items: center; gap: 8px;
  padding: 12px 22px;
  background: var(--pine);
  color: #fff;
  border: none; border-radius: 11px;
  font-family: 'Kodchasan', sans-serif;
  font-size: 14px; font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  box-shadow: 0 14px 26px -14px rgba(30,58,52,.55);
  transition: background .2s, transform .1s;
  text-decoration: none;
}
.btn-new:hover  { background: var(--pine-deep); }
.btn-new:active { transform: scale(.98); }
.btn-new-icon { font-size: 18px; line-height: 1; }

/* ── STAT STRIP ── */
.stat-strip {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
  margin-bottom: 32px;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--line-color);
  border-radius: 16px;
  padding: 20px 22px;
}
.stat-card-label {
  font-size: 12px; font-weight: 600;
  color: var(--muted);
  margin-bottom: 8px;
  letter-spacing: .02em;
}
.stat-card-num {
  font-size: 36px; font-weight: 700;
  color: var(--ink); line-height: 1;
}
.stat-card-num.pine  { color: var(--pine); }
.stat-card-num.brass { color: var(--brass); }
.stat-card-sub {
  font-size: 11.5px; color: var(--muted-2);
  margin-top: 6px;
}

/* ── SECTION ── */
.section-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px;
}
.section-title {
  font-size: 16px; font-weight: 700;
  color: var(--ink);
}
.section-count {
  font-size: 12.5px; color: var(--muted);
}

/* ── DASH FILTER ROW ── */
.dash-filter-row {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 14px;
}
.dash-chip {
  padding: 5px 14px; border-radius: 20px; font-size: 12.5px; font-weight: 600;
  border: 1.5px solid var(--line-color); background: var(--surface); color: var(--muted);
  cursor: pointer; transition: all .15s; font-family: 'Kodchasan', sans-serif;
}
.dash-chip:hover  { border-color: var(--pine); color: var(--pine); }
.dash-chip.active { background: var(--pine); border-color: var(--pine); color: #fff; }
.page-size-group {
  display: flex; align-items: center; gap: 4px; margin-left: auto;
}
.ps-btn {
  padding: 4px 12px; border-radius: 8px; font-size: 12.5px; font-weight: 700;
  border: 1.5px solid var(--line-color); background: none; color: var(--muted);
  cursor: pointer; transition: all .15s; font-family: 'Kodchasan', sans-serif;
}
.ps-btn.active { background: var(--pine); border-color: var(--pine); color: #fff; }
.ps-label { font-size: 11.5px; color: var(--muted-2); margin-left: 4px; }
.load-more-btn {
  display: block; width: 100%; padding: 12px; border-radius: 12px;
  border: 1.5px dashed var(--line-color); background: none;
  font-family: 'Kodchasan', sans-serif; font-size: 13px; font-weight: 600; color: var(--muted);
  cursor: pointer; transition: border-color .15s, color .15s; margin-top: 4px;
}
.load-more-btn:hover { border-color: var(--pine); color: var(--pine); }

/* ── BOOKING LIST ── */
.booking-list {
  display: flex; flex-direction: column; gap: 10px;
}

.booking-card {
  background: var(--surface);
  border: 1px solid var(--line-color);
  border-radius: 15px;
  padding: 14px 18px;
  display: flex; align-items: center; gap: 16px;
  cursor: pointer;
  transition: border-color .2s, box-shadow .2s, transform .15s;
  text-decoration: none;
  color: inherit;
}
.booking-card:hover {
  border-color: var(--line-2);
  box-shadow: 0 4px 20px -8px rgba(30,58,52,.12);
  transform: translateY(-1px);
}

/* guest photo */
.booking-photo {
  width: 54px; height: 62px;
  border-radius: 12px;
  background: var(--brass-bg);
  flex-shrink: 0;
  overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; font-weight: 700;
  color: var(--brass);
}
.booking-photo img { width: 100%; height: 100%; object-fit: cover; }

/* info */
.booking-info { flex: 1; min-width: 0; }
.booking-name-row {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 5px; flex-wrap: wrap;
}
.booking-name {
  font-size: 15px; font-weight: 600;
  color: var(--ink);
  white-space: nowrap;
}
.booking-id {
  font-size: 11.5px; font-weight: 600;
  color: var(--brass);
  background: var(--brass-bg);
  padding: 2px 9px; border-radius: 20px;
  white-space: nowrap;
}
.booking-meta {
  font-size: 12.5px; color: var(--muted);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* status pill */
.status-pill {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 12px; border-radius: 20px;
  font-size: 12px; font-weight: 600;
  white-space: nowrap; flex-shrink: 0;
}
.status-pill .dot {
  width: 6px; height: 6px; border-radius: 50%;
  flex-shrink: 0;
}
.status-pending  { background:#FBF0D8; color:#96701F; }
.status-pending .dot  { background:#D79A28; }
.status-approved { background:#DEEEE2; color:#2E6248; }
.status-approved .dot { background:#3C7A5A; }
.status-rejected { background:#F5DDD8; color:#A6483C; }
.status-rejected .dot { background:#B5493B; }
.status-cancelled{ background:#ECE7DD; color:#6E665A; }
.status-cancelled .dot{ background:#9A9182; }

/* purpose badge */
.purpose-badge {
  display: inline-flex; align-items: center;
  padding: 2px 9px; border-radius: 20px;
  font-size: 11px; font-weight: 600;
  white-space: nowrap; flex-shrink: 0;
  border: 1px solid transparent;
}
.purpose-badge.company {
  background: rgba(59,100,200,.08);
  border-color: rgba(59,100,200,.2);
  color: #3B64C8;
}
.purpose-badge.roommate {
  background: rgba(200,80,130,.08);
  border-color: rgba(200,80,130,.2);
  color: #C85082;
}
.purpose-badge.other {
  background: rgba(133,125,110,.07);
  border-color: rgba(133,125,110,.18);
  color: var(--muted);
}

/* chevron */
.chevron {
  font-size: 18px; color: var(--muted-2);
  flex-shrink: 0; margin-left: 4px;
}

/* ── EMPTY STATE ── */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  background: var(--surface);
  border: 1px solid var(--line-color);
  border-radius: 15px;
}
.empty-icon { font-size: 40px; margin-bottom: 14px; opacity: .4; }
.empty-title { font-size: 16px; font-weight: 600; color: var(--ink); margin-bottom: 6px; }
.empty-sub   { font-size: 13.5px; color: var(--muted); }

/* ── SKELETON ── */
.skeleton {
  background: linear-gradient(90deg, var(--line-color) 25%, var(--bg-alt) 50%, var(--line-color) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
  border-radius: 8px;
}
@keyframes shimmer { to { background-position: -200% 0; } }
.skel-card {
  background: var(--surface);
  border: 1px solid var(--line-color);
  border-radius: 15px;
  padding: 14px 18px;
  display: flex; align-items: center; gap: 16px;
  height: 90px;
}

/* ── RESPONSIVE ── */
@media (max-width: 760px) {
  .page { padding: 26px 16px 70px; }
  .stat-strip { grid-template-columns: repeat(2, 1fr); }
  .stat-strip .stat-card:last-child { grid-column: 1 / -1; }
  .page-header { flex-direction: column; align-items: flex-start; }
  .topbar { padding: 0 16px; }
  .topbar-user-info { display: none; }
  .logo-text { display: none; }
  .booking-meta { max-width: 180px; }
  .chevron { display: none; }
  /* hide desktop nav, show burger */
  .topbar-nav  { display: none; }
  .burger-btn  { display: flex; }
}
</style>
</head>
<body>

<!-- ── MOBILE NAV OVERLAY ── -->
<nav class="mobile-nav" id="mobile-nav" aria-label="เมนูหลัก">
  <ul class="mobile-nav-inner">
    <li><a href="dashboard.html" class="active">จองห้องพัก</a></li>
    <li><a href="profile.html">โปรไฟล์</a></li>
    <li><a href="admin.html" id="mob-admin" style="display:none">Admin</a></li>
  </ul>
</nav>

<!-- ── TOP BAR ── -->
<header class="topbar">
  <a href="dashboard.html" class="topbar-logo">
    <div class="logo-mark"><span>M</span></div>
    <span class="logo-text">MAISON Residence</span>
  </a>

  <!-- Desktop nav — centered -->
  <nav class="topbar-nav">
    <a href="dashboard.html" class="nav-link active">จองห้องพัก</a>
    <a href="profile.html"   class="nav-link">โปรไฟล์</a>
    <a href="admin.html" class="nav-link" id="nav-admin" style="display:none">Admin</a>
  </nav>

  <!-- Right side -->
  <div class="topbar-right">
    <!-- Bell notification -->
    <div style="position:relative">
      <button class="notif-btn" id="notif-btn" onclick="toggleNotifPanel()" aria-label="การแจ้งเตือน">
        <svg viewBox="0 0 24 24" stroke-width="1.8"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span class="notif-badge" id="notif-badge"></span>
      </button>
      <div class="notif-panel" id="notif-panel">
        <div class="notif-panel-head">
          <span>การแจ้งเตือน</span>
          <button class="notif-mark-all" onclick="markAllRead()">อ่านทั้งหมด</button>
        </div>
        <div class="notif-list" id="notif-list"><div class="notif-empty">ไม่มีการแจ้งเตือน</div></div>
      </div>
    </div>

    <div class="topbar-user" id="user-menu-btn" onclick="toggleUserMenu()" style="cursor:pointer">
      <div class="topbar-user-info">
        <span class="topbar-user-name" id="user-name">—</span>
        <span class="topbar-user-dept" id="user-dept">—</span>
      </div>
      <div class="avatar" id="user-avatar">—</div>
    </div>
    <div class="user-dropdown" id="user-dropdown">
      <a href="profile.html" class="user-dd-item">👤 โปรไฟล์</a>
      <button class="user-dd-item user-dd-logout" onclick="doLogout()">↩ ออกจากระบบ</button>
    </div>

    <!-- Mobile burger -->
    <button class="burger-btn" id="burger-btn" aria-label="เปิดเมนู">
      <span class="burger-line"></span>
      <span class="burger-label">เมนู</span>
    </button>
  </div>
</header>

<!-- ── PAGE ── -->
<main class="page">

  <!-- Header -->
  <div class="page-header">
    <div>
      <div class="page-eyebrow">MAISON Residence - สวัสดิการแรกเข้า TQM</div>
      <h1 class="page-title">รายการจองของฉัน</h1>
    </div>
    <a href="booking.html" class="btn-new">
      <span class="btn-new-icon">＋</span>
      ทำรายการจองห้องพัก
    </a>
  </div>

  <!-- Stat strip -->
  <div class="stat-strip">
    <div class="stat-card">
      <div class="stat-card-label">ทั้งหมด</div>
      <div class="stat-card-num" id="stat-total">—</div>
      <div class="stat-card-sub">รายการ</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-label">รออนุมัติ</div>
      <div class="stat-card-num brass" id="stat-pending">—</div>
      <div class="stat-card-sub">รายการ</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-label">อนุมัติแล้ว</div>
      <div class="stat-card-num pine" id="stat-approved">—</div>
      <div class="stat-card-sub">รายการ</div>
    </div>
  </div>

  <!-- Booking list -->
  <div class="section-header">
    <div class="section-title">ประวัติการจอง</div>
    <div class="section-count" id="list-count"></div>
  </div>

  <!-- Filter + Page size -->
  <div class="dash-filter-row">
    <button class="dash-chip active" onclick="setDashFilter('all',this)">ทั้งหมด</button>
    <button class="dash-chip" onclick="setDashFilter('pending',this)">รออนุมัติ</button>
    <button class="dash-chip" onclick="setDashFilter('approved',this)">จัดห้องแล้ว</button>
    <button class="dash-chip" onclick="setDashFilter('active',this)">กำลังพักอยู่</button>
    <button class="dash-chip" onclick="setDashFilter('cancelled',this)">ยกเลิก</button>
    <div class="page-size-group">
      <button class="ps-btn active" id="ps-5"  onclick="setDashPageSize(5,this)">5</button>
      <button class="ps-btn"        id="ps-10" onclick="setDashPageSize(10,this)">10</button>
      <span class="ps-label">รายการ</span>
    </div>
  </div>

  <div class="booking-list" id="booking-list">
    <div class="skel-card"><div class="skeleton" style="width:54px;height:62px;border-radius:12px;flex-shrink:0"></div><div style="flex:1;display:flex;flex-direction:column;gap:10px"><div class="skeleton" style="height:16px;width:55%"></div><div class="skeleton" style="height:13px;width:75%"></div></div></div>
    <div class="skel-card"><div class="skeleton" style="width:54px;height:62px;border-radius:12px;flex-shrink:0"></div><div style="flex:1;display:flex;flex-direction:column;gap:10px"><div class="skeleton" style="height:16px;width:45%"></div><div class="skeleton" style="height:13px;width:65%"></div></div></div>
    <div class="skel-card"><div class="skeleton" style="width:54px;height:62px;border-radius:12px;flex-shrink:0"></div><div style="flex:1;display:flex;flex-direction:column;gap:10px"><div class="skeleton" style="height:16px;width:60%"></div><div class="skeleton" style="height:13px;width:70%"></div></div></div>
  </div>
  <div id="load-more-wrap" style="display:none;margin-top:4px">
    <button class="load-more-btn" onclick="dashLoadMore()" id="load-more-btn">โหลดเพิ่มเติม</button>
  </div>

</main>

<script>
const GAS_API_URL = "https://script.google.com/macros/s/AKfycbyA-gggeWp7JG2P1GnMl5Zxbs4FgQubSOELnN7x63EE1Uqiy62GgzP5rtXBMsV3KwmW/exec";

// ── SESSION (localStorage + 8h expiry) ───────────────
function getSession() {
  try {
    const ts = +localStorage.getItem("maison_ts") || 0;
    if ((Date.now() - ts) / 3600000 > 8) { _clearSess(); return null; }
    const d = localStorage.getItem("maison_session");
    return d ? JSON.parse(d) : null;
  } catch(e) { return null; }
}
function _clearSess() { localStorage.removeItem("maison_session"); localStorage.removeItem("maison_ts"); }
function doLogout() { _clearSess(); location.replace("login.html"); }
function toggleUserMenu() {
  document.getElementById("user-dropdown").classList.toggle("open");
  document.getElementById("notif-panel").classList.remove("open");
}
function toggleNotifPanel() {
  document.getElementById("notif-panel").classList.toggle("open");
  document.getElementById("user-dropdown").classList.remove("open");
}
document.addEventListener("click", e => {
  const userBtn   = document.getElementById("user-menu-btn");
  const dd        = document.getElementById("user-dropdown");
  const notifBtn  = document.getElementById("notif-btn");
  const notifPanel= document.getElementById("notif-panel");
  if (userBtn && dd && !userBtn.contains(e.target))    dd.classList.remove("open");
  if (notifBtn && notifPanel && !notifBtn.contains(e.target) && !notifPanel.contains(e.target))
    notifPanel.classList.remove("open");
});

const session = getSession();
if (!session) location.replace("login.html");

// ── RENDER TOP BAR ───────────────────────────────────
document.getElementById("user-name").textContent   = session.name || "—";
document.getElementById("user-dept").textContent   = session.dept || "—";
document.getElementById("user-avatar").textContent = initials(session.name);

// โหลด profile photo จาก API (ไม่ block หน้าหลัก)
(async () => {
  try {
    const p = await api("getMyProfile");
    if (p.ok && p.photoUrl) {
      const av = document.getElementById("user-avatar");
      av.textContent = "";
      av.innerHTML = `<img src="${p.photoUrl}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
    }
  } catch(_) {}
})();

if (session.role === "admin") {
  document.getElementById("nav-admin").style.display = "";
  document.getElementById("mob-admin").style.display = "";
}

// ── API ──────────────────────────────────────────────
async function api(action, params = {}) {
  const res = await fetch(GAS_API_URL, {
    method: "POST",
    body  : JSON.stringify({ action, empId: session.empId, role: session.role, ...params }),
  });
  return res.json();
}

// ── LOAD BOOKINGS ────────────────────────────────────
let roomMap = {};  // roomId → room object

// ── BOOKING LIST STATE ───────────────────────────────
let allMyBookings = [];
let dashFilter    = "all";
let dashPageSize  = 5;
let dashShown     = 5;

async function loadBookings() {
  try {
    const [res, roomRes] = await Promise.all([api("getMyBookings"), api("getRooms")]);
    if (!res.ok) throw new Error(res.error);
    if (roomRes.ok && roomRes.data) roomRes.data.forEach(r => { roomMap[r.roomId] = r; });

    allMyBookings = res.data || [];

    // stats
    document.getElementById("stat-total").textContent    = allMyBookings.length;
    document.getElementById("stat-pending").textContent  = allMyBookings.filter(b => b.status === "pending").length;
    document.getElementById("stat-approved").textContent = allMyBookings.filter(b => ["approved","active"].includes(b.status)).length;

    dashShown = dashPageSize;
    renderMyBookings();
  } catch (e) {
    document.getElementById("booking-list").innerHTML = `
      <div class="empty-state"><div class="empty-icon">⚠️</div>
      <div class="empty-title">โหลดข้อมูลไม่ได้</div><div class="empty-sub">${e.message}</div></div>`;
  }
}

function setDashFilter(f, el) {
  dashFilter = f;
  dashShown  = dashPageSize;
  document.querySelectorAll(".dash-chip").forEach(c => c.classList.remove("active"));
  el.classList.add("active");
  renderMyBookings();
}

function setDashPageSize(n, el) {
  dashPageSize = n;
  dashShown    = n;
  document.querySelectorAll(".ps-btn").forEach(b => b.classList.remove("active"));
  el.classList.add("active");
  renderMyBookings();
}

function dashLoadMore() {
  dashShown += dashPageSize;
  renderMyBookings();
}

function renderMyBookings() {
  // filter
  let list = dashFilter === "all"
    ? allMyBookings
    : allMyBookings.filter(b => b.status === dashFilter);

  // sort: pending ก่อน → createdAt ใหม่สุด
  list = list.slice().sort((a, b) => {
    if (a.status === "pending" && b.status !== "pending") return -1;
    if (a.status !== "pending" && b.status === "pending") return  1;
    return new Date(b.createdAt) - new Date(a.createdAt);
  });

  document.getElementById("list-count").textContent = list.length + " รายการ";

  const el      = document.getElementById("booking-list");
  const moreWrap = document.getElementById("load-more-wrap");

  if (list.length === 0) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">🏨</div>
      <div class="empty-title">ไม่มีรายการ</div>
      <div class="empty-sub">${dashFilter === "all" ? "กดปุ่ม \"ทำรายการจองห้องพัก\" เพื่อเริ่มต้น" : "ลองเปลี่ยน filter"}</div></div>`;
    moreWrap.style.display = "none";
    return;
  }

  const visible = list.slice(0, dashShown);
  el.innerHTML = visible.map(b => bookingCardHTML(b)).join("");

  const remaining = list.length - dashShown;
  if (remaining > 0) {
    moreWrap.style.display = "";
    document.getElementById("load-more-btn").textContent = `โหลดเพิ่มเติม (${remaining} รายการ)`;
  } else {
    moreWrap.style.display = "none";
  }
}

// ── BOOKING CARD HTML ────────────────────────────────
function bookingCardHTML(b) {
  const statusLabel = {
    pending    : "รออนุมัติ",
    approved   : "จัดห้องแล้ว",
    active     : "กำลังพักอยู่",
    checked_out: "Check Out แล้ว",
    rejected   : "ปฏิเสธ",
    cancelled  : "ยกเลิกแล้ว",
  };

  const photoHTML = b.photoUrl
    ? `<img src="${b.photoUrl}" alt="">`
    : initials(b.firstName);

  // purpose badge
  const purposeText = String(b.purpose || "");
  const isCompany  = purposeText.includes("บริษัท") || purposeText.includes("กำหนด");
  const isRoommate = purposeText.includes("Roommate") || purposeText.includes("คู่");
  const badgeClass = isCompany ? "company" : isRoommate ? "roommate" : "other";
  const badgeLabel = purposeText || "—";
  const purposeBadge = `<span class="purpose-badge ${badgeClass}">${badgeLabel}</span>`;

  // meta line 2: วันที่ประสงค์เข้าพัก + วันเริ่มงาน
  const checkInTxt   = b.checkIn   ? "เข้าพัก " + formatDate(b.checkIn)  : "";
  const startDateTxt = b.startDate ? "เริ่มงาน " + formatDate(b.startDate) : "";
  const metaParts    = [checkInTxt, startDateTxt].filter(Boolean).join("  |  ");

  // empId badge
  const empIdBadge = b.empId ? `<span class="booking-id">EMP·${b.empId}</span>` : "";
  const deptText   = b.dept  ? `<span style="font-size:12px;color:var(--muted);font-weight:500">${b.dept}</span>` : "";

  // ห้องที่พัก (approved + assignedRoom)
  let roomLine = "";
  if (b.status === "approved" && b.assignedRoom) {
    const room = roomMap[b.assignedRoom];
    if (room) {
      const roomDetail = [
        room.floor  ? "ชั้น " + room.floor  : "",
        room.roomNo ? "ห้อง " + room.roomNo : "",
      ].filter(Boolean).join(" ");
      roomLine = `
        <div style="display:flex;align-items:center;gap:6px;margin-top:5px;font-size:12px;color:#2E6248;font-weight:600">
          <span>🏠</span>
          <span>กำลังพักอยู่ที่ ${room.location || b.assignedRoom}${roomDetail ? "  ·  " + roomDetail : ""}</span>
        </div>`;
    } else {
      roomLine = `<div style="font-size:12px;color:#2E6248;font-weight:600;margin-top:5px">🏠 กำลังพักอยู่ที่ ${b.assignedRoom}</div>`;
    }
  }

  return `
    <a class="booking-card" href="detail.html?id=${b.bookingId}">
      <div class="booking-photo">${photoHTML}</div>
      <div class="booking-info">
        <div class="booking-name-row">
          ${empIdBadge}
          <span class="booking-name">${b.firstName} ${b.lastName}</span>
          ${deptText}
        </div>
        <div class="booking-meta" style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          ${purposeBadge}
          ${metaParts ? `<span>${metaParts}</span>` : ""}
        </div>
        ${roomLine}
      </div>
      <div class="status-pill status-${b.status || 'pending'}">
        <span class="dot"></span>
        ${statusLabel[b.status] || b.status}
      </div>
      <span class="chevron">›</span>
    </a>`;
}

// ── HELPERS ──────────────────────────────────────────
function initials(name) {
  if (!name) return "?";
  const parts = name.trim().split(" ");
  return parts.length >= 2
    ? (parts[0][0] + parts[1][0]).toUpperCase()
    : name[0].toUpperCase();
}

function formatDate(str) {
  if (!str) return "";
  const d = new Date(str);
  if (isNaN(d)) return str;
  return d.toLocaleDateString("th-TH", { day:"numeric", month:"short", year:"2-digit" });
}

// ── BURGER MENU ──────────────────────────────────────
const burgerBtn = document.getElementById("burger-btn");
const mobileNav = document.getElementById("mobile-nav");

burgerBtn.addEventListener("click", () => {
  burgerBtn.classList.toggle("is-open");
  mobileNav.classList.toggle("is-open");
  burgerBtn.setAttribute("aria-label",
    mobileNav.classList.contains("is-open") ? "ปิดเมนู" : "เปิดเมนู"
  );
});

// ปิด overlay เมื่อคลิกพื้นหลัง
mobileNav.addEventListener("click", e => {
  if (e.target === mobileNav) {
    burgerBtn.classList.remove("is-open");
    mobileNav.classList.remove("is-open");
  }
});

// ── INIT ─────────────────────────────────────────────
loadBookings();
loadNotifs();

// ── NOTIFICATIONS ─────────────────────────────────────
let _notifData = [];

function relTime(iso) {
  if (!iso) return "";
  const diff = Date.now() - new Date(iso).getTime();
  const m = Math.floor(diff / 60000);
  if (m < 1)  return "เมื่อกี้";
  if (m < 60) return m + " นาทีที่แล้ว";
  const h = Math.floor(m / 60);
  if (h < 24) return h + " ชั่วโมงที่แล้ว";
  return Math.floor(h / 24) + " วันที่แล้ว";
}

async function loadNotifs() {
  try {
    const res = await api("getNotifications");
    if (!res.ok) return;
    _notifData = res.data || [];
    renderNotifs();
  } catch(e) {}
}

function renderNotifs() {
  const badge = document.getElementById("notif-badge");
  const list  = document.getElementById("notif-list");
  if (!badge || !list) return;
  const unread = _notifData.filter(n => !n.isRead).length;
  badge.textContent = unread > 9 ? "9+" : String(unread);
  badge.style.display = unread > 0 ? "flex" : "none";
  if (_notifData.length === 0) {
    list.innerHTML = '<div class="notif-empty">ไม่มีการแจ้งเตือน</div>';
    return;
  }
  list.innerHTML = _notifData.map(n => `
    <div class="notif-item ${n.isRead ? "" : "unread"}" onclick="onNotifClick('${n.notifId}','${n.bookingId}')">
      <div class="notif-dot ${n.isRead ? "read" : ""}"></div>
      <div class="notif-content">
        <div class="notif-msg">${n.message}</div>
        <div class="notif-time">${relTime(n.createdAt)}</div>
      </div>
    </div>`).join("");
}

async function onNotifClick(notifId, bookingId) {
  const n = _notifData.find(x => x.notifId === notifId);
  if (n && !n.isRead) {
    n.isRead = true; renderNotifs();
    api("markNotifRead", { notifId }).catch(()=>{});
  }
  document.getElementById("notif-panel").classList.remove("open");
  if (bookingId && bookingId !== "undefined" && bookingId !== "")
    location.href = "detail.html?id=" + bookingId;
}

async function markAllRead() {
  _notifData.forEach(n => n.isRead = true);
  renderNotifs();
  api("markAllNotifsRead").catch(()=>{});
}

setInterval(loadNotifs, 30000);
window.addEventListener("focus", loadNotifs);
// ──────────────────────────────────────────────────────
</script>
</body>
</html>
